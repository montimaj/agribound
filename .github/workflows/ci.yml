name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff>=0.3
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test-core:
    name: Core Tests (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Run unit tests
        run: pytest tests/unit -m "not gpu and not gee and not slow" --tb=short -q

  test-engines:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[all,dev]
      - name: Run integration tests
        run: pytest tests/integration -m "not gee and not gpu" --tb=short -q

  docs:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]
      - name: Build MkDocs site
        run: mkdocs build --strict
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress site/
          lycheeVersion: latest
          fail: true
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/deploy-pages@v4
